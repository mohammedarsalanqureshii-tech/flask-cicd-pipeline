apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-cicd

spec:
  replicas: 3

  selector:
    matchLabels:
      app: flask-cicd

  template:
    metadata:
      labels:
        app: flask-cicd

    spec:
      containers:
      - name: flask-cicd
        image: arsalan87/flask-cicd-pipeline:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
